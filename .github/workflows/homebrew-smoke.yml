name: Homebrew Smoke

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-14
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: juicyjusung/homebrew-tap
          path: homebrew-tap

      - name: Validate generated qgh formula
        shell: bash
        run: |
          formula="homebrew-tap/Formula/qgh.rb"
          test -f "$formula"
          grep -Eq '^ *url "https://github\.com/juicyjusung/qgh/releases/download/v[0-9]+\.[0-9]+\.[0-9]+[^"]*/qgh-[^"]+\.(tar\.gz|tar\.xz|zip)"$' "$formula"
          grep -Eq '^ *sha256 "[0-9a-f]{64}"$' "$formula"
          grep -Eq '^ *version "[0-9]+\.[0-9]+\.[0-9]+[^"]*"$' "$formula"

      - name: Install generated formula
        shell: bash
        run: |
          tap_dir="$(brew --repository)/Library/Taps/juicyjusung/homebrew-tap"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$PWD/homebrew-tap" "$tap_dir"
          brew install juicyjusung/tap/qgh
          qgh --version
          qgh help
