name: schedule-manager-gate

on:
  workflow_dispatch:
    inputs:
      profile_ids:
        description: "At least two space-separated disposable github_cli profile ids"
        required: true
      catch_up_observation:
        description: "Recorded physical sleep/offline-resume result and host/run reference"
        required: true

jobs:
  platform-manager:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: qgh-schedule-gate-macos
          - platform: linux
            runner: qgh-schedule-gate-linux
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build qgh
        run: cargo build
      - name: verify the real user manager
        env:
          PROFILE_IDS: "${{ inputs.profile_ids }}"
        run: |
          read -r -a profiles <<< "$PROFILE_IDS"
          scripts/verify-schedule-manager.sh target/debug/qgh "${profiles[@]}"
      - name: record physical catch-up observation
        env:
          CATCH_UP_OBSERVATION: "${{ inputs.catch_up_observation }}"
        run: |
          printf 'Physical catch-up observation: %s\n' "$CATCH_UP_OBSERVATION" >> "$GITHUB_STEP_SUMMARY"
