name: Homebrew Pre-publish Smoke

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  smoke:
    runs-on: macos-14
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ANALYTICS: "1"
    steps:
      - name: Fetch same-run release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts/
          merge-multiple: true

      - name: Prepare local Homebrew tap
        shell: bash
        run: |
          set -euo pipefail

          formula_matches="$(find artifacts -type f -name qgh.rb -print)"
          formula_count="$(printf '%s' "$formula_matches" | awk 'NF { count++ } END { print count + 0 }')"
          if [ "$formula_count" -ne 1 ]; then
            echo "::error::expected exactly one generated qgh.rb; found $formula_count"
            exit 1
          fi
          formula_source="$formula_matches"

          archive_matches="$(find artifacts -type f \( \
            -name 'qgh-aarch64-apple-darwin.tar.gz' -o \
            -name 'qgh-aarch64-apple-darwin.tar.xz' -o \
            -name 'qgh-aarch64-apple-darwin.zip' \
          \) -print)"
          archive_count="$(printf '%s' "$archive_matches" | awk 'NF { count++ } END { print count + 0 }')"
          if [ "$archive_count" -ne 1 ]; then
            echo "::error::expected exactly one Apple Silicon archive; found $archive_count"
            exit 1
          fi
          archive="$archive_matches"

          temporary_tap="$RUNNER_TEMP/homebrew-tap"
          mkdir -p "$temporary_tap/Formula"
          cp "$formula_source" "$temporary_tap/Formula/qgh.rb"

          archive="$(cd "$(dirname "$archive")" && pwd)/$(basename "$archive")"
          archive_url="file://${archive}"
          archive_sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"

          FORMULA="$temporary_tap/Formula/qgh.rb" \
          ARCHIVE_URL="$archive_url" \
          ARCHIVE_SHA256="$archive_sha256" \
          python3 - <<'PY'
          import os
          from pathlib import Path

          formula = Path(os.environ["FORMULA"])
          lines = formula.read_text().splitlines()
          in_macos_arm = False
          replaced_url = False
          replaced_sha256 = False

          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "if OS.mac? && Hardware::CPU.arm?":
                  in_macos_arm = True
              elif in_macos_arm and stripped == "end":
                  in_macos_arm = False
              elif in_macos_arm and stripped.startswith('url "'):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[index] = f'{indent}url "{os.environ["ARCHIVE_URL"]}"'
                  replaced_url = True
              elif in_macos_arm and stripped.startswith('sha256 "'):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines[index] = f'{indent}sha256 "{os.environ["ARCHIVE_SHA256"]}"'
                  replaced_sha256 = True

          if not (replaced_url and replaced_sha256):
              raise SystemExit("generated formula has no Apple Silicon URL/checksum stanza")

          formula.write_text("\n".join(lines) + "\n")
          PY

          grep -F "url \"$archive_url\"" "$temporary_tap/Formula/qgh.rb"
          grep -F "sha256 \"$archive_sha256\"" "$temporary_tap/Formula/qgh.rb"

      - name: Install same-run formula
        shell: bash
        run: |
          set -euo pipefail

          tap_dir="$(brew --repository)/Library/Taps/juicyjusung/homebrew-tap"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$RUNNER_TEMP/homebrew-tap" "$tap_dir"
          brew install juicyjusung/tap/qgh
          qgh --version
          qgh help
